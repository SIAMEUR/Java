# Configuration MQTT du frontend
# Chaque cle peut etre overridee par une variable d'environnement de meme nom
# en majuscules avec les points remplaces par des underscores
# (ex : mqtt.broker.url -> MQTT_BROKER_URL).

mqtt.broker.url=tcp://localhost:1883
mqtt.qos=1
mqtt.client.id.prefix=frontend-

# Topics MQTT utilises pour dialoguer avec le backend
mqtt.topic.commandes=lunettes/commandes
mqtt.topic.verification=lunettes/verification
mqtt.topic.livraison.prefix=lunettes/livraisons/
mqtt.topic.verification.result.prefix=lunettes/verification/result/
