name: Release

# A chaque release GitHub, build les deux fat jars livrables
# (frontend + backend) et les attache automatiquement a la release.
# Egalement declenchable manuellement pour test (les jars sortent en
# artefacts telechargeables).
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read   # pour telecharger com.github.siameur:usine depuis GitHub Packages

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation du JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configuration des credentials Maven
        env:
          BERNARD_PAT: ${{ secrets.BERNARD_PAT }}
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github-bernard</id>
                <username>le-prof-de-raizo</username>
                <password>${BERNARD_PAT}</password>
              </server>
              <server>
                <id>github</id>
                <username>${GH_USER}</username>
                <password>${GH_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build des fat jars
        run: mvn -B package -DskipTests

      - name: Renommage et regroupement des livrables
        run: |
          mkdir -p release
          cp frontend/target/frontend-*-SNAPSHOT.jar release/lunettes-connectees-frontend.jar
          cp backend/target/serveur-fabrique.jar release/serveur-fabrique.jar

      - name: Upload sur la release GitHub
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/lunettes-connectees-frontend.jar
            release/serveur-fabrique.jar

      - name: Artefacts telechargeables (lancement manuel)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: jars-livrables
          path: release/*.jar
