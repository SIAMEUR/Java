name: Frontend release

# Quand une release est creee sur GitHub, on build le fat jar du frontend
# et on l'attache automatiquement comme artefact telechargeable.
# Permet egalement un declenchement manuel depuis l'onglet Actions.
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation du JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build du fat jar
        working-directory: frontend
        run: mvn -B package -DskipTests

      - name: Renommage du jar pour la release
        run: |
          mkdir -p release
          cp frontend/target/frontend-*-SNAPSHOT.jar release/lunettes-connectees-frontend.jar

      - name: Upload sur la release GitHub
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/lunettes-connectees-frontend.jar

      - name: Artefact telechargeable (lancement manuel)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lunettes-connectees-frontend
          path: release/lunettes-connectees-frontend.jar
