name: Usine release

# Workflow obligatoire selon le sujet :
# "L'usine devra etre packagee sous la forme d'un .jar, et publiee sur un depot
#  maven heberge sur GitHub. La publication devra se faire via une action qui
#  reagit a la creation d'une release."
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necessaire pour publier sur GitHub Packages

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation du JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configuration des credentials Maven
        env:
          BERNARD_PAT: ${{ secrets.BERNARD_PAT }}
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github-bernard</id>
                <username>le-prof-de-raizo</username>
                <password>${BERNARD_PAT}</password>
              </server>
              <server>
                <id>github</id>
                <username>${GH_USER}</username>
                <password>${GH_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy de l'usine sur GitHub Packages
        run: mvn -B -pl usine -am deploy -DskipTests
