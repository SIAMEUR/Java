name: Full project build

# Build complet du projet (usine + backend + frontend) pour valider qu'il n'y a
# pas de regression. Necessite la PAT du prof (BERNARD_PAT) pour telecharger
# la dependance bernard-flou:fabricateur depuis le repo Maven prive.
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation du JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configuration des credentials Maven
        env:
          BERNARD_PAT: ${{ secrets.BERNARD_PAT }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github-bernard</id>
                <username>le-prof-de-raizo</username>
                <password>${BERNARD_PAT}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build complet
        run: mvn -B package -DskipTests
