name: Backend release

# A chaque release GitHub, construit le fat jar du backend (serveur-fabrique.jar
# avec toutes les dependances incluses, defini dans backend/pom.xml via le
# maven-assembly-plugin) et l'attache a la release pour telechargement.
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation du JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configuration des credentials Maven
        env:
          BERNARD_PAT: ${{ secrets.BERNARD_PAT }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github-bernard</id>
                <username>le-prof-de-raizo</username>
                <password>${BERNARD_PAT}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build du fat jar backend
        run: mvn -B -pl backend -am package -DskipTests

      - name: Upload sur la release GitHub
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: backend/target/serveur-fabrique.jar

      - name: Artefact telechargeable (lancement manuel)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: serveur-fabrique
          path: backend/target/serveur-fabrique.jar
