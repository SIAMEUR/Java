name: Frontend build

# Verifie a chaque push et chaque PR que le frontend compile.
# Ne touche pas aux modules backend/usine qui ont leurs propres dependances privees.
on:
  push:
    branches:
      - master
      - dev
      - 'feature/**'
    paths:
      - 'frontend/**'
      - 'pom.xml'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    branches:
      - master
      - dev
    paths:
      - 'frontend/**'
      - 'pom.xml'
      - '.github/workflows/frontend-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation du JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilation et packaging du frontend
        working-directory: frontend
        run: mvn -B package -DskipTests
