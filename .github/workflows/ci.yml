name: CI

# Build complet du projet a chaque push et chaque pull request pour
# verifier que rien n'est casse avant un merge.
on:
  push:
    branches:
      - master
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # pour telecharger com.github.siameur:usine depuis GitHub Packages

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation du JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configuration des credentials Maven
        env:
          BERNARD_PAT: ${{ secrets.BERNARD_PAT }}
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github-bernard</id>
                <username>le-prof-de-raizo</username>
                <password>${BERNARD_PAT}</password>
              </server>
              <server>
                <id>github</id>
                <username>${GH_USER}</username>
                <password>${GH_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build complet
        run: mvn -B package -DskipTests
